services:
  backend:
    build: ./backend
    container_name: efficacy-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: efficacy-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  backend-uploads:
